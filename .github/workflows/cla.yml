name: CLA Assistant

on:
  issue_comment:
    types: [created]
  pull_request_target:
    types: [opened, closed, synchronize]

jobs:
  CLAssistant:
    runs-on: ubuntu-latest
    steps:
      - name: CLA Assistant
        uses: contributor-assistant/github-action@v2.6.1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PERSONAL_ACCESS_TOKEN: ${{ secrets.CLA_ASSISTANT_PAT }}
        with:
          path-to-signatures: 'signatures/cla.json'
          path-to-document: 'https://github.com/trustgraph-ai/contributor-license-agreement/blob/main/README.md'
          branch: 'main'
          remote-repository-name: 'contributor-license-agreement'
          remote-organization-name: 'trustgraph-ai'
          sign-comment: 'I have read the CLA Document and I hereby sign the CLA'
          signed-commit-message: 'CLA signed by @${{ github.event.comment.user.login }}'
          allowlist: 'dependabot,dependabot[bot],github-actions,github-actions[bot]'
